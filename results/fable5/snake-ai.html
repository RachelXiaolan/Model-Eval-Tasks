<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>贪吃蛇 · AI 自动游玩</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    font-family: "PingFang SC", "Microsoft YaHei", -apple-system, sans-serif;
    color: #e8e8e8;
    gap: 16px;
    padding: 20px;
  }
  h1 { font-size: 22px; font-weight: 600; letter-spacing: 2px; }
  .hud {
    display: flex;
    gap: 24px;
    align-items: center;
    font-size: 15px;
  }
  .hud .score-box {
    background: rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 8px 18px;
    text-align: center;
  }
  .hud .score-box .label { font-size: 12px; color: #9aa0b5; }
  .hud .score-box .value { font-size: 20px; font-weight: 700; color: #4ecca3; }
  .hud .score-box .value.hi { color: #ffd369; }
  #board {
    border-radius: 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    background: #0f1626;
  }
  .controls { display: flex; gap: 12px; }
  button {
    border: none;
    border-radius: 8px;
    padding: 10px 22px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: transform .1s, opacity .2s;
    color: #fff;
  }
  button:active { transform: scale(0.96); }
  #modeBtn { background: #3d5af1; }
  #modeBtn.ai { background: #e94560; }
  #restartBtn { background: rgba(255,255,255,0.15); }
  .tip { font-size: 13px; color: #9aa0b5; }
</style>
</head>
<body>
  <h1>🐍 贪吃蛇 · AI 自动游玩</h1>
  <div class="hud">
    <div class="score-box"><div class="label">分数</div><div class="value" id="score">0</div></div>
    <div class="score-box"><div class="label">最高分</div><div class="value hi" id="hiScore">0</div></div>
    <div class="score-box"><div class="label">模式</div><div class="value" id="modeLabel" style="color:#3d9df1">手动</div></div>
  </div>
  <canvas id="board" width="480" height="480"></canvas>
  <div class="controls">
    <button id="modeBtn">切换到 AI 模式</button>
    <button id="restartBtn">重新开始</button>
  </div>
  <div class="tip">手动模式:方向键 / WASD 控制 · 空格暂停</div>

<script>
(() => {
  const COLS = 24, ROWS = 24, CELL = 20;
  const canvas = document.getElementById('board');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const hiScoreEl = document.getElementById('hiScore');
  const modeLabel = document.getElementById('modeLabel');
  const modeBtn = document.getElementById('modeBtn');
  const restartBtn = document.getElementById('restartBtn');

  const DIRS = [
    { x: 0, y: -1 }, // 上
    { x: 0, y: 1 },  // 下
    { x: -1, y: 0 }, // 左
    { x: 1, y: 0 },  // 右
  ];

  let snake, dir, nextDir, food, score, gameOver, paused, aiMode, timer;
  let hiScore = +(localStorage.getItem('snakeHiScore') || 0);
  hiScoreEl.textContent = hiScore;

  const idx = (x, y) => y * COLS + x;
  const inBounds = (x, y) => x >= 0 && x < COLS && y >= 0 && y < ROWS;

  function reset() {
    snake = [{ x: 8, y: 12 }, { x: 7, y: 12 }, { x: 6, y: 12 }];
    dir = { x: 1, y: 0 };
    nextDir = dir;
    score = 0;
    gameOver = false;
    paused = false;
    placeFood();
    updateScore();
    restartTimer();
    draw();
  }

  function restartTimer() {
    clearInterval(timer);
    // AI 模式跑快一点,手动模式舒适速度;随分数略微加速
    const base = aiMode ? 60 : 130;
    const speed = Math.max(45, base - Math.floor(score / 5) * 5);
    timer = setInterval(tick, speed);
  }

  function placeFood() {
    const occupied = new Set(snake.map(s => idx(s.x, s.y)));
    const free = [];
    for (let y = 0; y < ROWS; y++)
      for (let x = 0; x < COLS; x++)
        if (!occupied.has(idx(x, y))) free.push({ x, y });
    food = free.length ? free[Math.floor(Math.random() * free.length)] : null;
  }

  function updateScore() {
    scoreEl.textContent = score;
    if (score > hiScore) {
      hiScore = score;
      localStorage.setItem('snakeHiScore', hiScore);
      hiScoreEl.textContent = hiScore;
    }
  }

  // ---------- AI 部分 ----------
  // 策略:
  // 1. BFS 找到去食物的最短路;在"虚拟蛇"上走完这条路后,若蛇头仍能追到蛇尾(不会困死),就走这条路。
  // 2. 否则退而求其次:朝自己尾巴方向走(追尾必然安全,可以拖时间等局面变化)。
  // 3. 再不行,随便挑一个不会立刻撞死、且后续活动空间最大的方向。

  function bfs(start, target, body, tailWillMove) {
    // body: 蛇身数组(含头)。tailWillMove: 移动时尾巴是否让出格子
    const blocked = new Uint8Array(COLS * ROWS);
    const len = tailWillMove ? body.length - 1 : body.length;
    for (let i = 0; i < len; i++) blocked[idx(body[i].x, body[i].y)] = 1;
    blocked[idx(start.x, start.y)] = 0;

    const prev = new Int16Array(COLS * ROWS).fill(-1);
    const visited = new Uint8Array(COLS * ROWS);
    const queue = [start];
    visited[idx(start.x, start.y)] = 1;

    while (queue.length) {
      const cur = queue.shift();
      if (cur.x === target.x && cur.y === target.y) {
        // 回溯路径(不含起点)
        const path = [];
        let ci = idx(cur.x, cur.y);
        while (ci !== idx(start.x, start.y)) {
          path.push({ x: ci % COLS, y: Math.floor(ci / COLS) });
          ci = prev[ci];
        }
        return path.reverse();
      }
      for (const d of DIRS) {
        const nx = cur.x + d.x, ny = cur.y + d.y;
        if (!inBounds(nx, ny)) continue;
        const ni = idx(nx, ny);
        if (visited[ni] || blocked[ni]) continue;
        // 允许目标格即使被占(用于"能否到达尾巴"判断)
        if (blocked[ni] && !(nx === target.x && ny === target.y)) continue;
        visited[ni] = 1;
        prev[ni] = idx(cur.x, cur.y);
        queue.push({ x: nx, y: ny });
      }
    }
    return null;
  }

  function canReachTail(body) {
    // 蛇头能否到达蛇尾所在格(尾巴每步都会移动,能追到尾巴 ≈ 不会被困死)
    const head = body[0];
    const tail = body[body.length - 1];
    if (body.length < 2) return true;
    const blocked = new Uint8Array(COLS * ROWS);
    // 尾巴那格视为可走(它马上会让开)
    for (let i = 0; i < body.length - 1; i++) blocked[idx(body[i].x, body[i].y)] = 1;
    blocked[idx(head.x, head.y)] = 0;

    const visited = new Uint8Array(COLS * ROWS);
    const queue = [head];
    visited[idx(head.x, head.y)] = 1;
    while (queue.length) {
      const cur = queue.shift();
      if (cur.x === tail.x && cur.y === tail.y) return true;
      for (const d of DIRS) {
        const nx = cur.x + d.x, ny = cur.y + d.y;
        if (!inBounds(nx, ny)) continue;
        const ni = idx(nx, ny);
        if (visited[ni]) continue;
        if (blocked[ni] && !(nx === tail.x && ny === tail.y)) continue;
        visited[ni] = 1;
        queue.push({ x: nx, y: ny });
      }
    }
    return false;
  }

  function simulatePath(body, path, foodPos) {
    // 沿 path 走完后的蛇身
    let sim = body.map(s => ({ ...s }));
    for (const step of path) {
      sim.unshift({ x: step.x, y: step.y });
      if (!(step.x === foodPos.x && step.y === foodPos.y)) sim.pop();
    }
    return sim;
  }

  function floodSize(from, body) {
    // 从 from 出发的可达空格数,用于兜底时挑"空间最大"的方向
    const blocked = new Uint8Array(COLS * ROWS);
    for (const s of body) blocked[idx(s.x, s.y)] = 1;
    if (!inBounds(from.x, from.y) || blocked[idx(from.x, from.y)]) return 0;
    const visited = new Uint8Array(COLS * ROWS);
    const queue = [from];
    visited[idx(from.x, from.y)] = 1;
    let count = 0;
    while (queue.length) {
      const cur = queue.shift();
      count++;
      for (const d of DIRS) {
        const nx = cur.x + d.x, ny = cur.y + d.y;
        if (!inBounds(nx, ny)) continue;
        const ni = idx(nx, ny);
        if (visited[ni] || blocked[ni]) continue;
        visited[ni] = 1;
        queue.push({ x: nx, y: ny });
      }
    }
    return count;
  }

  function aiNextDir() {
    const head = snake[0];

    // 1) 尝试直奔食物
    if (food) {
      const path = bfs(head, food, snake, true);
      if (path && path.length) {
        const after = simulatePath(snake, path, food);
        if (canReachTail(after)) {
          const step = path[0];
          return { x: step.x - head.x, y: step.y - head.y };
        }
      }
    }

    // 2) 追尾巴保命
    const tail = snake[snake.length - 1];
    const tailPath = bfs(head, tail, snake, false);
    if (tailPath && tailPath.length) {
      const step = tailPath[0];
      // 确认这一步本身不撞身体(尾巴会让开)
      if (isSafeCell(step.x, step.y)) {
        return { x: step.x - head.x, y: step.y - head.y };
      }
    }

    // 3) 兜底:挑活动空间最大的安全方向
    let best = null, bestSpace = -1;
    for (const d of DIRS) {
      const nx = head.x + d.x, ny = head.y + d.y;
      if (!isSafeCell(nx, ny)) continue;
      const simBody = [{ x: nx, y: ny }, ...snake.slice(0, -1)];
      const space = floodSize({ x: nx, y: ny }, simBody.slice(1));
      if (space > bestSpace) { bestSpace = space; best = d; }
    }
    return best || dir; // 实在没路,保持原方向(必死)
  }

  function isSafeCell(x, y) {
    if (!inBounds(x, y)) return false;
    // 尾巴这一步会让开,除非正好吃到食物——保守起见把尾巴视为让开、但吃食物的格子单独判断
    const eating = food && x === food.x && y === food.y;
    const len = eating ? snake.length : snake.length - 1;
    for (let i = 0; i < len; i++) {
      if (snake[i].x === x && snake[i].y === y) return false;
    }
    return true;
  }

  // ---------- 游戏主循环 ----------
  function tick() {
    if (gameOver || paused) return;

    if (aiMode) {
      const d = aiNextDir();
      if (d && !(d.x === -dir.x && d.y === -dir.y)) nextDir = d;
    }
    dir = nextDir;

    const head = snake[0];
    const nx = head.x + dir.x, ny = head.y + dir.y;

    // 撞墙 / 撞自己(尾巴即将让开的格子不算,除非这步吃到食物)
    const eating = food && nx === food.x && ny === food.y;
    const bodyLen = eating ? snake.length : snake.length - 1;
    let crash = !inBounds(nx, ny);
    if (!crash) {
      for (let i = 0; i < bodyLen; i++) {
        if (snake[i].x === nx && snake[i].y === ny) { crash = true; break; }
      }
    }
    if (crash) {
      gameOver = true;
      clearInterval(timer);
      draw();
      return;
    }

    snake.unshift({ x: nx, y: ny });
    if (eating) {
      score += 10;
      updateScore();
      placeFood();
      restartTimer();
      if (!food) { gameOver = true; clearInterval(timer); } // 填满全场,通关
    } else {
      snake.pop();
    }
    draw();
  }

  // ---------- 绘制 ----------
  function draw() {
    ctx.fillStyle = '#0f1626';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 网格
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 1;
    for (let i = 1; i < COLS; i++) {
      ctx.beginPath(); ctx.moveTo(i * CELL, 0); ctx.lineTo(i * CELL, canvas.height); ctx.stroke();
    }
    for (let i = 1; i < ROWS; i++) {
      ctx.beginPath(); ctx.moveTo(0, i * CELL); ctx.lineTo(canvas.width, i * CELL); ctx.stroke();
    }

    // 食物
    if (food) {
      const fx = food.x * CELL + CELL / 2, fy = food.y * CELL + CELL / 2;
      ctx.fillStyle = '#e94560';
      ctx.beginPath();
      ctx.arc(fx, fy, CELL / 2 - 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.beginPath();
      ctx.arc(fx - 3, fy - 3, 2.5, 0, Math.PI * 2);
      ctx.fill();
    }

    // 蛇(头到尾渐变)
    for (let i = snake.length - 1; i >= 0; i--) {
      const s = snake[i];
      const t = i / Math.max(snake.length - 1, 1);
      if (i === 0) {
        ctx.fillStyle = '#4ecca3';
      } else {
        const g = Math.round(204 - t * 90);
        ctx.fillStyle = `rgb(${Math.round(78 - t * 30)}, ${g}, ${Math.round(163 - t * 60)})`;
      }
      const pad = i === 0 ? 1 : 2;
      roundRect(s.x * CELL + pad, s.y * CELL + pad, CELL - pad * 2, CELL - pad * 2, i === 0 ? 6 : 4);
    }

    // 蛇眼睛
    const h = snake[0];
    ctx.fillStyle = '#0f1626';
    const cx = h.x * CELL + CELL / 2, cy = h.y * CELL + CELL / 2;
    const ex = dir.x * 3, ey = dir.y * 3;
    const px = dir.x === 0 ? 4 : 0, py = dir.y === 0 ? 4 : 0;
    ctx.beginPath(); ctx.arc(cx + ex - px, cy + ey - py, 2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + ex + px, cy + ey + py, 2, 0, Math.PI * 2); ctx.fill();

    // 覆盖层
    if (gameOver || paused) {
      ctx.fillStyle = 'rgba(15, 22, 38, 0.75)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.textAlign = 'center';
      ctx.fillStyle = gameOver ? '#e94560' : '#ffd369';
      ctx.font = 'bold 34px sans-serif';
      ctx.fillText(gameOver ? (food ? 'Game Over' : '🎉 通关!') : '已暂停', canvas.width / 2, canvas.height / 2 - 10);
      ctx.fillStyle = '#e8e8e8';
      ctx.font = '16px sans-serif';
      ctx.fillText(gameOver ? `得分 ${score} · 点击「重新开始」` : '按空格继续', canvas.width / 2, canvas.height / 2 + 24);
    }
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
    ctx.fill();
  }

  // ---------- 输入 ----------
  const KEY_DIRS = {
    ArrowUp: { x: 0, y: -1 }, KeyW: { x: 0, y: -1 },
    ArrowDown: { x: 0, y: 1 }, KeyS: { x: 0, y: 1 },
    ArrowLeft: { x: -1, y: 0 }, KeyA: { x: -1, y: 0 },
    ArrowRight: { x: 1, y: 0 }, KeyD: { x: 1, y: 0 },
  };

  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
      e.preventDefault();
      if (!gameOver) { paused = !paused; draw(); }
      return;
    }
    const d = KEY_DIRS[e.code];
    if (!d) return;
    e.preventDefault();
    if (aiMode || gameOver || paused) return;
    // 禁止 180° 掉头(以当前实际方向为准)
    if (d.x === -dir.x && d.y === -dir.y) return;
    nextDir = d;
  });

  modeBtn.addEventListener('click', () => {
    aiMode = !aiMode;
    modeBtn.textContent = aiMode ? '切换到手动模式' : '切换到 AI 模式';
    modeBtn.classList.toggle('ai', aiMode);
    modeLabel.textContent = aiMode ? 'AI' : '手动';
    modeLabel.style.color = aiMode ? '#e94560' : '#3d9df1';
    if (!gameOver) restartTimer();
  });

  restartBtn.addEventListener('click', reset);

  aiMode = false;
  reset();
})();
</script>
</body>
</html>
