<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>贪吃蛇 · AI 自动游玩</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1e2a3a 0%, #2c3e50 100%);
    font-family: "Segoe UI", -apple-system, "Microsoft YaHei", sans-serif;
    color: #ecf0f1;
  }
  .wrap {
    background: rgba(0, 0, 0, 0.25);
    padding: 24px 28px;
    border-radius: 16px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    backdrop-filter: blur(6px);
  }
  h1 {
    text-align: center;
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 14px;
    letter-spacing: 2px;
    color: #2ecc71;
  }
  .scoreboard {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 14px;
    font-size: 15px;
  }
  .scoreboard .pill {
    background: rgba(255,255,255,0.08);
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.12);
  }
  .scoreboard b { color: #f1c40f; }
  #mode-tag {
    color: #3498db;
    font-weight: 600;
  }
  canvas {
    display: block;
    background: #0f1620;
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 8px;
  }
  .controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 14px;
    flex-wrap: wrap;
  }
  button {
    background: #2ecc71;
    color: #0f1620;
    border: none;
    padding: 9px 18px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.08s, background 0.2s;
  }
  button:hover { background: #27ae60; }
  button:active { transform: scale(0.96); }
  #mode-btn { background: #3498db; }
  #mode-btn:hover { background: #2980b9; }
  #mode-btn.ai { background: #9b59b6; }
  #mode-btn.ai:hover { background: #8e44ad; }
  .hint {
    text-align: center;
    margin-top: 10px;
    font-size: 12px;
    color: #95a5a6;
  }
  .overlay {
    position: absolute;
    pointer-events: none;
    color: #e74c3c;
    font-size: 30px;
    font-weight: 700;
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
  }
</style>
</head>
<body>
  <div class="wrap">
    <h1>🐍 贪吃蛇</h1>
    <div class="scoreboard">
      <span class="pill">分数：<b id="score">0</b></span>
      <span class="pill">最高分：<b id="highscore">0</b></span>
      <span class="pill">模式：<span id="mode-tag">手动</span></span>
    </div>
    <div style="position:relative;">
      <canvas id="game" width="480" height="480"></canvas>
      <div id="over-msg" class="overlay" style="display:none; left:0; top:0; width:480px; height:480px; display:none; align-items:center; justify-content:center;"></div>
    </div>
    <div class="controls">
      <button id="mode-btn">切换 AI 自动模式</button>
      <button id="restart-btn">重新开始</button>
      <button id="speed-btn">速度：普通</button>
    </div>
    <div class="hint">方向键 / WASD 控制 · 空格暂停 · 切换 AI 后蛇会自动寻路</div>
  </div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const GRID = 20;                       // 每格像素
  const COLS = canvas.width / GRID;      // 24
  const ROWS = canvas.height / GRID;     // 24

  const scoreEl = document.getElementById('score');
  const highEl  = document.getElementById('highscore');
  const modeTag = document.getElementById('mode-tag');
  const modeBtn = document.getElementById('mode-btn');
  const restartBtn = document.getElementById('restart-btn');
  const speedBtn = document.getElementById('speed-btn');
  const overMsg = document.getElementById('over-msg');

  let snake, dir, nextDir, food, score, alive, paused, aiMode, tickTimer;
  let highScore = +(localStorage.getItem('snake_high') || 0);
  highEl.textContent = highScore;

  const SPEEDS = { '慢': 140, '普通': 90, '快': 55 };
  const speedKeys = ['慢', '普通', '快'];
  let speedIdx = 1;

  function reset() {
    snake = [
      { x: 8, y: 12 }, { x: 7, y: 12 }, { x: 6, y: 12 }
    ];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    alive = true;
    paused = false;
    placeFood();
    scoreEl.textContent = score;
    overMsg.style.display = 'none';
    scheduleTick();
  }

  function placeFood() {
    while (true) {
      const f = {
        x: Math.floor(Math.random() * COLS),
        y: Math.floor(Math.random() * ROWS)
      };
      if (!snake.some(s => s.x === f.x && s.y === f.y)) {
        food = f;
        return;
      }
    }
  }

  function scheduleTick() {
    if (tickTimer) clearInterval(tickTimer);
    tickTimer = setInterval(tick, SPEEDS[speedKeys[speedIdx]]);
  }

  // ---------- 主循环 ----------
  function tick() {
    if (!alive || paused) { draw(); return; }

    if (aiMode) {
      const move = computeAIMove();
      if (move) nextDir = move;
    }

    // 防止反向 180°
    if (nextDir.x !== -dir.x || nextDir.y !== -dir.y) dir = nextDir;

    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // 撞墙
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
      return gameOver();
    }
    // 撞自己（除尾巴：尾巴会移动）
    const willGrow = (head.x === food.x && head.y === food.y);
    const body = willGrow ? snake : snake.slice(0, -1);
    if (body.some(s => s.x === head.x && s.y === head.y)) {
      return gameOver();
    }

    snake.unshift(head);
    if (willGrow) {
      score++;
      scoreEl.textContent = score;
      if (score > highScore) {
        highScore = score;
        highEl.textContent = highScore;
        localStorage.setItem('snake_high', highScore);
      }
      placeFood();
    } else {
      snake.pop();
    }

    draw();
  }

  function gameOver() {
    alive = false;
    overMsg.textContent = '💀 Game Over · 按「重新开始」';
    overMsg.style.display = 'flex';
    draw();
  }

  // ---------- 绘制 ----------
  function draw() {
    ctx.fillStyle = '#0f1620';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 网格线
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 1;
    for (let i = 1; i < COLS; i++) {
      ctx.beginPath(); ctx.moveTo(i*GRID, 0); ctx.lineTo(i*GRID, canvas.height); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, i*GRID); ctx.lineTo(canvas.width, i*GRID); ctx.stroke();
    }

    // 食物
    const fx = food.x * GRID + GRID/2;
    const fy = food.y * GRID + GRID/2;
    ctx.fillStyle = '#e74c3c';
    ctx.shadowColor = '#e74c3c';
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.arc(fx, fy, GRID/2 - 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // 蛇
    for (let i = snake.length - 1; i >= 0; i--) {
      const s = snake[i];
      const t = i / snake.length;
      if (i === 0) {
        ctx.fillStyle = aiMode ? '#d6a4e8' : '#2ecc71';
      } else {
        const r = aiMode
          ? Math.round(110 + 60 * (1 - t))
          : Math.round(46 + 30 * (1 - t));
        const g = aiMode
          ? Math.round(70 + 40 * (1 - t))
          : Math.round(150 + 50 * (1 - t));
        const b = aiMode
          ? Math.round(130 + 60 * (1 - t))
          : Math.round(100 + 30 * (1 - t));
        ctx.fillStyle = `rgb(${r},${g},${b})`;
      }
      roundRect(ctx, s.x*GRID + 1, s.y*GRID + 1, GRID - 2, GRID - 2, 5);
      ctx.fill();
    }

    // 蛇眼
    if (alive && snake.length) {
      const h = snake[0];
      ctx.fillStyle = '#0f1620';
      const ex = h.x * GRID, ey = h.y * GRID;
      const off = 4;
      ctx.beginPath();
      if (dir.x === 1)      { ctx.arc(ex+GRID-off, ey+off, 2, 0, 7); ctx.arc(ex+GRID-off, ey+GRID-off, 2, 0, 7); }
      else if (dir.x === -1){ ctx.arc(ex+off, ey+off, 2, 0, 7); ctx.arc(ex+off, ey+GRID-off, 2, 0, 7); }
      else if (dir.y === -1){ ctx.arc(ex+off, ey+off, 2, 0, 7); ctx.arc(ex+GRID-off, ey+off, 2, 0, 7); }
      else                  { ctx.arc(ex+off, ey+GRID-off, 2, 0, 7); ctx.arc(ex+GRID-off, ey+GRID-off, 2, 0, 7); }
      ctx.fill();
    }

    if (paused) {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#ecf0f1';
      ctx.font = '28px Segoe UI';
      ctx.textAlign = 'center';
      ctx.fillText('⏸ 已暂停', canvas.width/2, canvas.height/2);
    }
  }

  function roundRect(c, x, y, w, h, r) {
    c.beginPath();
    c.moveTo(x+r, y);
    c.arcTo(x+w, y, x+w, y+h, r);
    c.arcTo(x+w, y+h, x, y+h, r);
    c.arcTo(x, y+h, x, y, r);
    c.arcTo(x, y, x+w, y, r);
    c.closePath();
  }

  // ---------- AI：BFS 最短路径 + 安全兜底 ----------
  function computeAIMove() {
    const head = snake[0];
    const path = bfs(head, food, snake);
    if (path && path.length > 1) {
      const step = path[1];
      const move = { x: step.x - head.x, y: step.y - head.y };
      // 即使找到路径，也要确认走完之后仍能追到尾巴（防止把自己困死）
      if (isSafeMove(move)) return move;
    }
    // 找不到安全的最短路径 → 朝能活最久的方向走（追尾巴 / 避死）
    return survivalMove();
  }

  function key(p) { return p.x + ',' + p.y; }

  // BFS：避开蛇身（认为尾巴会让位，所以排除最后一节）
  function bfs(start, goal, obstacles) {
    const blocked = new Set();
    for (let i = 0; i < obstacles.length - 1; i++) blocked.add(key(obstacles[i]));
    const q = [start];
    const seen = new Set([key(start)]);
    const prev = new Map();
    while (q.length) {
      const cur = q.shift();
      if (cur.x === goal.x && cur.y === goal.y) {
        const path = [];
        let c = cur;
        while (c) { path.unshift(c); c = prev.get(key(c)); }
        return path;
      }
      for (const d of [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}]) {
        const nx = cur.x + d.x, ny = cur.y + d.y;
        if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) continue;
        const k = nx + ',' + ny;
        if (seen.has(k) || blocked.has(k)) continue;
        seen.add(k);
        prev.set(k, cur);
        q.push({ x: nx, y: ny });
      }
    }
    return null;
  }

  // 模拟走一步后的蛇身
  function simulateSnake(move) {
    const head = snake[0];
    const newHead = { x: head.x + move.x, y: head.y + move.y };
    if (newHead.x < 0 || newHead.x >= COLS || newHead.y < 0 || newHead.y >= ROWS) return null;
    const willGrow = (newHead.x === food.x && newHead.y === food.y);
    const body = willGrow ? snake : snake.slice(0, -1);
    if (body.some(s => s.x === newHead.x && s.y === newHead.y)) return null;
    const newSnake = [newHead, ...body];
    return newSnake;
  }

  // 走一步后，蛇头能否到达自己的尾巴 → 说明没被困死
  function isSafeMove(move) {
    const sim = simulateSnake(move);
    if (!sim) return false;
    const head = sim[0];
    const tail = sim[sim.length - 1];
    const blocked = new Set();
    for (let i = 0; i < sim.length - 1; i++) blocked.add(key(sim[i]));
    const q = [head];
    const seen = new Set([key(head)]);
    while (q.length) {
      const cur = q.shift();
      if (cur.x === tail.x && cur.y === tail.y) return true;
      for (const d of [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}]) {
        const nx = cur.x + d.x, ny = cur.y + d.y;
        if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) continue;
        const k = nx + ',' + ny;
        if (seen.has(k) || blocked.has(k)) continue;
        seen.add(k);
        q.push({ x: nx, y: ny });
      }
    }
    return false;
  }

  // 兜底：选一个能让自己活得最久的方向（最大化可达空间）
  function survivalMove() {
    const moves = [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}]
      .filter(d => !(d.x === -dir.x && d.y === -dir.y)); // 不能 180°
    let best = null, bestArea = -1;
    for (const m of moves) {
      const sim = simulateSnake(m);
      if (!sim) continue;
      const area = floodFill(sim[0], sim);
      if (area > bestArea) { bestArea = area; best = m; }
    }
    return best;
  }

  function floodFill(start, obstacles) {
    const blocked = new Set();
    for (let i = 0; i < obstacles.length - 1; i++) blocked.add(key(obstacles[i]));
    const q = [start];
    const seen = new Set([key(start)]);
    let count = 0;
    while (q.length) {
      const cur = q.shift();
      count++;
      if (count > COLS * ROWS) break;
      for (const d of [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}]) {
        const nx = cur.x + d.x, ny = cur.y + d.y;
        if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) continue;
        const k = nx + ',' + ny;
        if (seen.has(k) || blocked.has(k)) continue;
        seen.add(k);
        q.push({ x: nx, y: ny });
      }
    }
    return count;
  }

  // ---------- 输入 ----------
  document.addEventListener('keydown', e => {
    const k = e.key.toLowerCase();
    if (k === ' ') { paused = !paused; draw(); e.preventDefault(); return; }
    if (aiMode) return; // AI 模式忽略方向输入
    if (k === 'arrowup'    || k === 'w') nextDir = { x: 0, y: -1 };
    else if (k === 'arrowdown'  || k === 's') nextDir = { x: 0, y: 1 };
    else if (k === 'arrowleft'  || k === 'a') nextDir = { x: -1, y: 0 };
    else if (k === 'arrowright' || k === 'd') nextDir = { x: 1, y: 0 };
  });

  modeBtn.addEventListener('click', () => {
    aiMode = !aiMode;
    modeBtn.classList.toggle('ai', aiMode);
    modeBtn.textContent = aiMode ? '切换手动模式' : '切换 AI 自动模式';
    modeTag.textContent = aiMode ? 'AI 自动' : '手动';
    modeTag.style.color = aiMode ? '#9b59b6' : '#3498db';
  });

  restartBtn.addEventListener('click', reset);

  speedBtn.addEventListener('click', () => {
    speedIdx = (speedIdx + 1) % speedKeys.length;
    speedBtn.textContent = '速度：' + speedKeys[speedIdx];
    scheduleTick();
  });

  // ---------- 启动 ----------
  aiMode = false;
  reset();
  draw();
})();
</script>
</body>
</html>
